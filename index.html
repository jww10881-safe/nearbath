<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>광주 공중화장실 찾기</title>
    
    <!-- Google Fonts: Pretendard (Korean) and Inter (English/Numbers) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard-dynamic-subset.css" />
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Region Selection Screen -->
    <div id="region-screen" class="region-screen">
        <header class="header glassmorphism">
            <h1>전국 <span>공중화장실</span> 찾기</h1>
            <p>급할 땐 내 위치로 가장 빠르게!</p>
        </header>

        <!-- 내 주변 찾기 메인 버튼 -->
        <button id="quick-location-btn" class="quick-location-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            현재 내 위치 주변에서 찾기
        </button>

        <div class="divider">
            <span>또는 지역/동네 검색</span>
        </div>

        <!-- 검색창 UI -->
        <div class="search-container">
            <input type="text" id="region-search-input" placeholder="예: 서울 강남구, 부산 해운대구">
            <button id="region-search-btn" class="search-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>

        <div class="divider" style="margin-top: 10px;">
            <span>빠른 전국 주요 도시/도 선택</span>
        </div>

        <div class="region-list">
            <button class="region-btn" data-lat="37.5665" data-lng="126.9780"><span>서울특별시</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="35.1796" data-lng="129.0756"><span>부산광역시</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="35.8714" data-lng="128.6014"><span>대구광역시</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="37.4563" data-lng="126.7052"><span>인천광역시</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="35.1595" data-lng="126.8526"><span>광주광역시</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="36.3504" data-lng="127.3845"><span>대전광역시</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="35.5384" data-lng="129.3114"><span>울산광역시</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="36.4800" data-lng="127.2890"><span>세종특별자치시</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="37.2750" data-lng="127.0096"><span>경기도</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="37.8853" data-lng="127.7298"><span>강원특별자치도</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="36.6356" data-lng="127.4913"><span>충청북도</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="36.6588" data-lng="126.6728"><span>충청남도</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="35.8202" data-lng="127.1088"><span>전북특별자치도</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="34.8161" data-lng="126.4629"><span>전라남도</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="36.5759" data-lng="128.5056"><span>경상북도</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="35.2383" data-lng="128.6922"><span>경상남도</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <button class="region-btn" data-lat="33.4890" data-lng="126.4983"><span>제주특별자치도</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map" class="hidden"></div>

    <!-- UI Overlay (Map Screen) -->
    <div id="map-ui" class="ui-layer hidden">
        <!-- Header -->
        <header class="header glassmorphism">
            <button id="back-btn" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                지역 다시 선택
            </button>
        </header>

        <!-- Loading Overlay -->
        <div id="loading" class="loading-overlay hidden">
            <div class="spinner"></div>
            <p>데이터를 불러오는 중입니다...</p>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="my-location-btn" class="fab glassmorphism" aria-label="내 위치 찾기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>

        <!-- Bottom Sheet (Information Panel) -->
        <div id="info-panel" class="bottom-sheet glassmorphism hidden">
            <div class="drag-handle"></div>
            <div class="info-content">
                <h2 id="restroom-name">화장실 이름</h2>
                
                <!-- 거리 표시 열 (내 위치 기반일 때만 표시) -->
                <div class="info-row" id="distance-row" style="display: none; color: var(--primary); font-weight: 700;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path></svg>
                    <p id="restroom-distance">내 위치에서 약 0m</p>
                </div>

                <div class="info-row">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <p id="restroom-address">주소 정보</p>
                </div>
                <div class="info-row">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    <p id="restroom-time">개방 시간 정보</p>
                </div>
                <div class="info-badges">
                    <span id="badge-unisex" class="badge">남녀공용</span>
                    <span id="badge-cctv" class="badge">CCTV 설치</span>
                </div>
                
                <!-- 네비게이션 버튼 -->
                <button id="nav-btn" class="nav-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                    </svg>
                    길찾기 (도보/차량)
                </button>
                
                <button id="close-panel-btn" class="primary-btn">닫기</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script src="./app.js"></script>
</body>
</html>
